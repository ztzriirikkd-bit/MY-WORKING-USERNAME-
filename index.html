<!DOCTYPE html>
<html>
<head>
<title>Hacker Team OFC</title>

<style>
body {
    background: linear-gradient(135deg,#020617,#0f172a);
    color:white;
    text-align:center;
    font-family:Arial;
}
.box {
    background:#1e293b;
    padding:25px;
    margin:60px auto;
    width:90%;
    max-width:320px;
    border-radius:15px;
}
button {
    padding:12px;
    background:#22c55e;
    border:none;
    border-radius:8px;
    color:white;
    cursor:pointer;
}
iframe {
    margin-top:10px;
    border-radius:10px;
}
</style>

</head>
<body>

<div class="box">

<h2>🔥 HACKER TEAM OFC 🔥</h2>

<h3>📥 Download APK</h3>
<a id="downloadLink" href="#" target="_blank">
<button>⬇ Download</button>
</a>

<h3>🎥 Watch Video</h3>
<iframe id="videoFrame" width="100%" height="180"></iframe>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

var firebaseConfig = {
  apiKey: "AIzaSyCMNr0GmJNf1-6tmODKR18mfrE-Nyy4YfI",
  authDomain: "hacker-xaman.firebaseapp.com",
  databaseURL: "https://hacker-xaman-default-rtdb.firebaseio.com",
  projectId: "hacker-xaman",
};

firebase.initializeApp(firebaseConfig);

firebase.database().ref("app").on("value", function(snapshot){
    var data = snapshot.val();

    if(data){
        document.getElementById("downloadLink").href = data.apk;
        document.getElementById("videoFrame").src = "https://www.youtube.com/embed/" + data.video;
    }
});

</script>

</body>
</html>
